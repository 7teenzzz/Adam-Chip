services:
  adam-orchestrator:
    build:
      context: .
      dockerfile: System/Dockerfile
    container_name: adam-orchestrator
    network_mode: host
    restart: unless-stopped
    environment:
      ADAM_CONFIG: /app/System/Config.json
      ADAM_MODE: ${ADAM_MODE:-maintenance}
      ADAM_DATA_DIR: /data/adam
      ESP_BASE_URL: ${ESP_BASE_URL:-http://192.168.0.171}
      ADAM_LLM_PROVIDER: ${ADAM_LLM_PROVIDER:-ollama}
      ADAM_LLM_BASE_URL: ${ADAM_LLM_BASE_URL:-http://127.0.0.1:11434}
      ADAM_LLM_MODEL: ${ADAM_LLM_MODEL:-gemma3:4b}
      ADAM_TTS_BASE_URL: ${ADAM_TTS_BASE_URL:-http://127.0.0.1:8082}
      ADAM_ASR_HOST: ${ADAM_ASR_HOST:-127.0.0.1}
      ADAM_ASR_PORT: ${ADAM_ASR_PORT:-8083}
      ADAM_VLM_BASE_URL: ${ADAM_VLM_BASE_URL:-http://127.0.0.1:8084}
      ADAM_VLM_MODEL: ${ADAM_VLM_MODEL:-Efficient-Large-Model/VILA1.5-3b}
      ADAM_ORCHESTRATOR_PORT: ${ADAM_ORCHESTRATOR_PORT:-8080}
      ADAM_VIDEO_DEVICE: ${ADAM_VIDEO_DEVICE:-/dev/video0}
      ADAM_AUDIO_INPUT_DEVICE: ${ADAM_AUDIO_INPUT_DEVICE:-hw:1,0}
      ADAM_ASR_WHISPER_BASE_URL: ${ADAM_ASR_WHISPER_BASE_URL:-http://127.0.0.1:8083}
      ADAM_AUDIO_OUTPUT_DEVICE: ${ADAM_AUDIO_OUTPUT_DEVICE:-default}
    volumes:
      - ./data:/data
      - /dev:/dev
      - /run/udev:/run/udev:ro
    privileged: true

  adam-tts-silero:
    build:
      context: .
      dockerfile: System/Dockerfile
    container_name: adam-tts-silero
    profiles:
      - speech-local
    network_mode: host
    restart: unless-stopped
    environment:
      ADAM_TTS_PORT: ${ADAM_TTS_PORT:-8082}
      ADAM_TTS_OUTPUT_DEVICE: ${ADAM_AUDIO_OUTPUT_DEVICE:-default}
    command: ["python", "-m", "Speech.TTS"]
    volumes:
      - ./data:/data
      - ./models:/root/.cache

  adam-llm:
    # Optional Docker alternative to the native systemd adam-llm.service.
    # Use profile llm-docker to activate: docker compose --profile llm-docker up adam-llm
    # Recommended: use systemd service instead (scripts/adam_install_systemd.sh).
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    container_name: adam-llm
    profiles:
      - llm-docker
    network_mode: host
    restart: unless-stopped
    runtime: nvidia
    environment:
      LLAMA_ARG_MODEL: /models/gemma-4-E4B-it-UD-Q4_K_XL.gguf
      LLAMA_ARG_HOST: 127.0.0.1
      LLAMA_ARG_PORT: "8081"
      LLAMA_ARG_N_GPU_LAYERS: "99"
      LLAMA_ARG_CTX_SIZE: "8192"
      LLAMA_ARG_PARALLEL: "1"
    volumes:
      - ./Subsystem/Models/gguf:/models:ro

  adam-asr-whisperx:
    build:
      context: .
      dockerfile: System/Dockerfile
    container_name: adam-asr-whisperx
    profiles:
      - speech-local
    network_mode: host
    restart: unless-stopped
    runtime: nvidia
    environment:
      PYTHONPATH: System
      ADAM_ASR_PORT: ${ADAM_ASR_PORT:-8095}
      ADAM_ASR_WHISPERX_MODEL: ${ADAM_ASR_WHISPERX_MODEL:-large-v3}
      ADAM_ASR_LANGUAGE: ${ADAM_ASR_LANGUAGE:-ru}
      ADAM_ASR_DEVICE: cuda
      ADAM_ASR_COMPUTE_TYPE: float16
      ADAM_ASR_SAMPLE_RATE: "16000"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /hf_cache
      HF_HUB_CACHE: /hf_cache/hub
    command: ["python", "-m", "Speech.ASR_WhisperX"]
    volumes:
      - ./data:/data
      - ./data/hf_cache:/hf_cache
      - /etc/localtime:/etc/localtime:ro

  # Deprecated: use adam-asr-whisperx instead
  adam-asr-whisper:
    build:
      context: .
      dockerfile: System/Dockerfile
    container_name: adam-asr-whisper
    profiles:
      - speech-local-legacy
    network_mode: host
    restart: unless-stopped
    environment:
      ADAM_ASR_PORT: ${ADAM_ASR_PORT:-8083}
      ADAM_ASR_WHISPER_MODEL: ${ADAM_ASR_WHISPER_MODEL:-medium}
      ADAM_ASR_LANGUAGE: ${ADAM_ASR_LANGUAGE:-ru}
      ADAM_ASR_DEVICE: ${ADAM_ASR_DEVICE:-auto}
    command: ["python", "-m", "Speech.ASR_Whisper"]
    volumes:
      - ./data:/data
      - ./models:/root/.cache

  adam-asr-speaches:
    # faster-whisper + CUDA ASR via speaches (OpenAI-compatible API on :8000).
    # Activate: docker compose --profile asr-speaches up adam-asr-speaches
    image: dustynv/speaches:r36.4.0-cu128-24.04
    container_name: adam-asr-speaches
    profiles:
      - asr-speaches
    network_mode: host
    restart: unless-stopped
    runtime: nvidia
    working_dir: /opt/speaches
    environment:
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PORT: "8083"
      WHISPER__INFERENCE_DEVICE: cuda
      WHISPER__COMPUTE_TYPE: float16
      WHISPER__TTL: "-1"
      WHISPER__VAD_FILTER: "false"
      HF_HOME: /hf_cache
      HF_HUB_CACHE: /hf_cache/hub
    volumes:
      - ./Subsystem/Models/hf:/hf_cache
      - /etc/localtime:/etc/localtime:ro

  # Run NVIDIA Riva and nano_llm/VILA with their official Jetson setup flows,
  # then point ADAM_LLM_BASE_URL / Riva host / VLM URL at those services.
  # They are intentionally not hidden behind guessed Compose images here.
